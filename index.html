    <style>
      * { font-family: 'Outfit', sans-serif; }
      @keyframes slideFromLeft   { from { opacity:0; transform: translateX(-36px) } to { opacity:1; transform: translateX(0) } }
      @keyframes slideFromRight  { from { opacity:0; transform: translateX(36px) }  to { opacity:1; transform: translateX(0) } }
      @keyframes slideFromTop    { from { opacity:0; transform: translateY(-22px) } to { opacity:1; transform: translateY(0) } }
      @keyframes slideFromBottom { from { opacity:0; transform: translateY(22px) }  to { opacity:1; transform: translateY(0) } }
      @keyframes cardFadeIn      { from { opacity:0 } to { opacity:1 } }
    </style>

    <!-- Shaka Player: UMD global carregado antes do bundle (window.shaka) -->
